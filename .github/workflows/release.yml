name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: aeronav-cli

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            binary_name: aeronav-cli
            archive_name: aeronav-cli-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz

          # Windows
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            binary_name: aeronav-cli.exe
            archive_name: aeronav-cli-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip

          # macOS ARM (native)
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            binary_name: aeronav-cli
            archive_name: aeronav-cli-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz

          # macOS Intel (cross)
          - os: macos-latest
            label: macos-x86_64
            target: x86_64-apple-darwin
            binary_name: aeronav-cli
            archive_name: aeronav-cli-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Add compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked -p aeronav-cli --target ${{ matrix.target }}

      # ---------- Linux + macOS ----------
      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_DIR="dist/${BIN_NAME}-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "${PACKAGE_DIR}"

          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${PACKAGE_DIR}/"
          cp README.md "${PACKAGE_DIR}/"
          cp CHANGELOG.md "${PACKAGE_DIR}/"
          cp LICENSE-MIT "${PACKAGE_DIR}/"
          cp LICENSE-APACHE "${PACKAGE_DIR}/"

          tar -czf "${{ matrix.archive_name }}" -C dist "$(basename "${PACKAGE_DIR}")"

          sha256sum "${{ matrix.archive_name }}" > "${{ matrix.archive_name }}.sha256"

      # ---------- Windows ----------
      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageDir = "dist/${env:BIN_NAME}-${env:GITHUB_REF_NAME}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" $packageDir
          Copy-Item "README.md" $packageDir
          Copy-Item "CHANGELOG.md" $packageDir
          Copy-Item "LICENSE-MIT" $packageDir
          Copy-Item "LICENSE-APACHE" $packageDir

          Compress-Archive -Path "$packageDir/*" -DestinationPath "${{ matrix.archive_name }}" -Force

          $hash = (Get-FileHash "${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive_name }}" | Out-File -Encoding ascii "${{ matrix.archive_name }}.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show downloaded files
        run: find release-artifacts -type f | sort

      - name: Publish release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release-artifacts/**/*
          generate_release_notes: false
          overwrite_files: true
          fail_on_unmatched_files: true